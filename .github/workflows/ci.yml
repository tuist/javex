name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MIX_ENV: test
  JAVEX_BUILD: "1"

jobs:
  check:
    name: Format, Credo, Compile, Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Cache mix deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/javex_nif/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('native/javex_nif/Cargo.toml', 'native/javex_nif/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install mix dependencies
        run: mix deps.get

      - name: Check formatting (Quokka plugin)
        run: mix format --check-formatted

      - name: Credo (strict)
        run: mix credo --strict

      - name: Compile without warnings
        run: mix compile --warnings-as-errors --force

      - name: Run tests
        run: mix test
