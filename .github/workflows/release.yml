name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build_nif:
    name: NIF ${{ matrix.job.target }}
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        nif: ["2.16"]
        job:
          - { target: aarch64-apple-darwin,       os: macos-14 }
          - { target: x86_64-apple-darwin,        os: macos-13 }
          - { target: x86_64-unknown-linux-gnu,   os: ubuntu-22.04 }
          - { target: aarch64-unknown-linux-gnu,  os: ubuntu-22.04-arm }

    steps:
      - uses: actions/checkout@v4

      - name: Extract project version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build precompiled NIF
        id: build
        uses: philss/rustler-precompiled-action@v1.1.5
        with:
          project-name: javex_nif
          project-version: ${{ steps.version.outputs.version }}
          target: ${{ matrix.job.target }}
          nif-version: ${{ matrix.nif }}
          use-cross: false
          project-dir: native/javex_nif

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.file-name }}
          path: ${{ steps.build.outputs.file-path }}
          if-no-files-found: error

  publish_release:
    name: Publish GitHub Release
    needs: build_nif
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download NIF artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGES.md
          files: artifacts/*
          fail_on_unmatched_files: true
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
